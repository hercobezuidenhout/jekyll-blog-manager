name: Beta Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Create Beta Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get current version
        id: current
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Get PR labels
        id: pr_labels
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          PR_NUMBER=$(echo "$COMMIT_MSG" | grep -oP '(?<=#)\d+' | head -1)

          if [ -n "$PR_NUMBER" ]; then
            LABELS=$(gh pr view $PR_NUMBER --json labels --jq '.labels[].name' | tr '\n' ',')
            echo "labels=$LABELS" >> $GITHUB_OUTPUT
            echo "PR #$PR_NUMBER merged (labels: $LABELS)"
          else
            echo "labels=" >> $GITHUB_OUTPUT
            echo "Direct push to main (no PR labels)"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Calculate new version
        id: version
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          LABELS="${{ steps.pr_labels.outputs.labels }}"

          if [[ $CURRENT =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(-beta\.([0-9]+))?$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
            BETA="${BASH_REMATCH[5]}"
          else
            echo "Invalid version format: $CURRENT"
            exit 1
          fi

          echo "Parsed version: $MAJOR.$MINOR.$PATCH${BETA:+-beta.$BETA}"

          HAS_MAJOR=$(echo "$LABELS" | grep -o "bump:major" || true)

          if [ -z "$BETA" ]; then
            if [ -n "$HAS_MAJOR" ]; then
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              BETA=1
            else
              MINOR=$((MINOR + 1))
              PATCH=0
              BETA=1
            fi
          else
            if [ -n "$HAS_MAJOR" ]; then
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              BETA=1
            else
              BETA=$((BETA + 1))
            fi
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH-beta.$BETA"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Update versions
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"
          node scripts/sync-version.js $NEW_VERSION

      - name: Commit version bump
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          NEW="${{ steps.version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json manifest.json versions.json
          git commit -m "bump: From v$CURRENT to v$NEW"
          git push origin main

      - name: Create git tag
        run: |
          NEW="${{ steps.version.outputs.version }}"
          git tag "v$NEW"
          git push origin "v$NEW"

      - name: Build plugin
        run: npm run build

      - name: Extract CHANGELOG for release
        id: changelog
        run: |
          CHANGELOG_CONTENT=$(sed -n '/## \[Unreleased\]/,/^## \[/{ /^## \[Unreleased\]/d; /^## \[/d; p; }' CHANGELOG.md | sed '/^$/d')

          cat > release_notes.md <<EOF
          **Pre-release version** - Install using BRAT (Beta Reviewers Auto-update Tester).

          ## Changes in this release

          $CHANGELOG_CONTENT

          ---

          ### Installation with BRAT

          1. Install the [BRAT plugin](https://github.com/TfTHacker/obsidian42-brat)
          2. Add this repository: \`hercobezuidenhout/jequill\`
          3. Enable the plugin in Obsidian settings

          BRAT will automatically update to new pre-releases.
          EOF

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            dist/main.js \
            dist/manifest.json \
            --title "v${{ steps.version.outputs.version }}" \
            --notes-file release_notes.md \
            --prerelease \
            --generate-notes
